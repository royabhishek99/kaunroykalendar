<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthly Calendar Agenda</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #edeae5;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #dce8e6;
      --shadow-sm: 0 1px 2px rgba(40, 37, 29, 0.06);
      --shadow-md: 0 6px 18px rgba(40, 37, 29, 0.08);
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #22211f;
      --color-border: #393836;
      --color-divider: #262523;
      --color-text: #cdccca;
      --color-text-muted: #9a9996;
      --color-text-faint: #666563;
      --color-text-inverse: #171614;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #25373a;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }

    button, input, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }

    .page {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: var(--space-6) 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .brand h1 { font-size: var(--text-xl); line-height: 1.1; margin-bottom: var(--space-1); }
    .brand p { font-size: var(--text-sm); color: var(--color-text-muted); }
    .top-actions { display: flex; align-items: center; gap: var(--space-2); }

    .icon-btn, .nav-btn, .action-btn, .mobile-switch {
      min-height: 44px;
      border-radius: var(--radius-md);
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .icon-btn {
      min-width: 44px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
    }

    .nav-btn, .action-btn, .mobile-switch {
      padding: 0 var(--space-4);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    .action-btn.primary, .mobile-switch.active {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-color: var(--color-primary);
    }

    .icon-btn:hover, .nav-btn:hover, .action-btn:hover, .mobile-switch:hover { background: var(--color-surface-offset); }
    .action-btn.primary:hover, .mobile-switch.active:hover { background: var(--color-primary-hover); }

    .calendar-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface-2);
      flex-wrap: wrap;
    }

    .calendar-header h2 { font-size: var(--text-lg); }
    .calendar-nav { display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }

    .mobile-view-toggle {
      display: none;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
    }

    .desktop-calendar { display: block; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }

    .weekday {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface-2);
    }

    .day-cell {
      min-height: 124px;
      padding: var(--space-3);
      border-right: 1px solid var(--color-divider);
      border-bottom: 1px solid var(--color-divider);
      background: var(--color-surface);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      text-align: left;
    }

    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell:hover { background: var(--color-surface-2); }
    .day-cell.other-month { color: var(--color-text-faint); background: color-mix(in srgb, var(--color-surface) 82%, transparent); }
    .day-cell.selected { background: var(--color-primary-highlight); }
    .day-cell.today .date-badge,
    .mobile-day-card.today .mobile-date-number { background: var(--color-primary); color: var(--color-text-inverse); }

    .date-row, .mobile-date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-2);
    }

    .date-badge, .mobile-date-number {
      min-width: 2rem;
      height: 2rem;
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      background: transparent;
    }

    .agenda-count, .mobile-weekday { font-size: var(--text-xs); color: var(--color-text-muted); }
    .agenda-preview, .mobile-agenda-preview { display: grid; gap: var(--space-2); align-content: start; }

    .agenda-chip, .mobile-agenda-chip {
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      background: var(--color-surface-offset);
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agenda-chip.more, .mobile-agenda-chip.more {
      background: transparent;
      color: var(--color-text-muted);
      padding-inline: 0;
    }

    .mobile-calendar { display: none; padding: var(--space-4); background: var(--color-surface); }
    .mobile-calendar-grid { display: grid; grid-template-columns: 1fr; gap: var(--space-3); }

    .mobile-day-card {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      padding: var(--space-3);
      display: grid;
      gap: var(--space-3);
      text-align: left;
    }

    .mobile-day-card.other-month { opacity: 0.62; }
    .mobile-day-card.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }
    .mobile-meta { display: flex; justify-content: space-between; align-items: center; gap: var(--space-3); flex-wrap: wrap; }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100dvh;
      width: min(420px, 100%);
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
      transform: translateX(100%);
      transition: transform var(--transition);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      z-index: 20;
    }

    .drawer.open { transform: translateX(0); }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer-head, .drawer-subhead, .drawer-footer { padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-divider); }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
    }

    .drawer-head h3 { font-size: var(--text-lg); }
    .drawer-subhead p { font-size: var(--text-sm); color: var(--color-text-muted); }

    .drawer-body {
      padding: var(--space-5);
      overflow-y: auto;
      display: grid;
      gap: var(--space-5);
      align-content: start;
    }

    .agenda-list { display: grid; gap: var(--space-3); }

    .day-summary {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      background: var(--color-surface-2);
      display: grid;
      gap: var(--space-2);
    }

    .empty-state {
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      color: var(--color-text-muted);
      background: var(--color-surface-2);
      font-size: var(--text-sm);
    }

    .checklist-block { display: grid; gap: var(--space-3); }
    .checklist-block label { font-size: var(--text-sm); font-weight: 500; }
    .checklist-input-row { display: flex; gap: var(--space-2); align-items: center; }
    .checklist-items { display: grid; gap: var(--space-2); }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
    }

    .checklist-item input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: var(--color-primary);
      flex: 0 0 auto;
    }

    .checklist-item span { flex: 1; font-size: var(--text-sm); word-break: break-word; }
    .checklist-item.done span { text-decoration: line-through; color: var(--color-text-muted); }

    .remove-check-btn {
      min-width: 36px;
      min-height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
    }

    .field {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      padding: 0.85rem 0.9rem;
    }

    .drawer-footer {
      border-top: 1px solid var(--color-divider);
      border-bottom: none;
      display: flex;
      justify-content: flex-end;
      gap: var(--space-2);
      background: var(--color-surface);
      flex-wrap: wrap;
    }

    .muted { color: var(--color-text-muted); font-size: var(--text-xs); }

    @media (max-width: 860px) {
      .page { width: min(100%, calc(100% - 1rem)); padding: var(--space-4) 0; }
      .weekday { font-size: 0.78rem; padding-inline: var(--space-2); }
      .day-cell { min-height: 96px; padding: var(--space-2); }
      .agenda-chip { display: none; }
      .agenda-chip:first-child, .agenda-chip.more { display: block; }
      .calendar-header { padding-inline: var(--space-4); }
    }

    @media (max-width: 640px) {
      .topbar, .calendar-header { align-items: flex-start; }
      .calendar-header { flex-direction: column; }
      .calendar-nav { width: 100%; justify-content: space-between; }
      .mobile-view-toggle { display: flex; }
      .desktop-calendar { display: none; }
      .mobile-calendar { display: block; }
      .drawer { width: 100%; }
      .drawer-head, .drawer-subhead, .drawer-body, .drawer-footer { padding-inline: var(--space-4); }
      .drawer-footer > button { flex: 1 1 0; }
      .checklist-input-row { flex-direction: column; align-items: stretch; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">
        <h1>KAUNROY KALENDAR</h1>
      </div>
      <div class="top-actions">
        <button class="icon-btn" type="button" data-theme-toggle aria-label="Switch theme"><span aria-hidden="true">☾</span></button>
      </div>
    </div>

    <section class="calendar-card" aria-label="Monthly agenda calendar">
      <div class="calendar-header">
        <h2 id="monthLabel">June 2026</h2>
        <div class="calendar-nav">
          <button class="nav-btn" type="button" id="prevMonth">Previous</button>
          <button class="nav-btn" type="button" id="nextMonth">Next</button>
        </div>
      </div>

      <div class="mobile-view-toggle" id="mobileViewToggle" aria-label="Mobile calendar view switch">
        <button class="mobile-switch active" type="button" data-mobile-view="list">List view</button>
        <button class="mobile-switch" type="button" data-mobile-view="compact">Compact view</button>
      </div>

      <div class="desktop-calendar">
        <div class="calendar-grid" aria-hidden="true">
          <div class="weekday">Sunday</div>
          <div class="weekday">Monday</div>
          <div class="weekday">Tuesday</div>
          <div class="weekday">Wednesday</div>
          <div class="weekday">Thursday</div>
          <div class="weekday">Friday</div>
          <div class="weekday">Saturday</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div class="mobile-calendar">
        <div class="mobile-calendar-grid" id="mobileCalendarGrid"></div>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="agendaDrawer" aria-hidden="true" aria-label="Agenda details">
    <div class="drawer-head">
      <h3 id="drawerTitle">Daily Agenda</h3>
      <button class="icon-btn" type="button" id="closeDrawer" aria-label="Close agenda panel">✕</button>
    </div>
    <div class="drawer-subhead">
      <p id="drawerDateText">Select a date to see its agenda.</p>
    </div>
    <div class="drawer-body">
      <section>
        <div class="agenda-list" id="agendaList"></div>
      </section>
      <section class="checklist-block">
        <label for="checkItemInput">Agenda item</label>
        <div class="checklist-input-row">
          <input class="field" id="checkItemInput" type="text" placeholder="Add an agenda item for this day" />
          <button class="action-btn primary" type="button" id="addCheckItem">Add item</button>
        </div>
        <div class="checklist-items" id="checklistItems"></div>
        <p class="muted">Add all the items that need to be done on this day, then save the list.</p>
      </section>
    </div>
    <div class="drawer-footer">
      <button class="action-btn" type="button" id="clearDayAgenda">Clear day</button>
      <button class="action-btn primary" type="button" id="saveAgenda">Save</button>
    </div>
  </aside>

  <script>
    const monthLabel = document.getElementById('monthLabel');
    const calendarGrid = document.getElementById('calendarGrid');
    const mobileCalendarGrid = document.getElementById('mobileCalendarGrid');
    const agendaDrawer = document.getElementById('agendaDrawer');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const drawerTitle = document.getElementById('drawerTitle');
    const drawerDateText = document.getElementById('drawerDateText');
    const agendaList = document.getElementById('agendaList');
    const saveAgendaBtn = document.getElementById('saveAgenda');
    const clearDayAgendaBtn = document.getElementById('clearDayAgenda');
    const closeDrawerBtn = document.getElementById('closeDrawer');
    const checkItemInput = document.getElementById('checkItemInput');
    const addCheckItemBtn = document.getElementById('addCheckItem');
    const checklistItems = document.getElementById('checklistItems');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const themeToggle = document.querySelector('[data-theme-toggle]');
    const mobileSwitches = Array.from(document.querySelectorAll('[data-mobile-view]'));

    const today = new Date();
    const state = {
      currentMonth: new Date(2026, 5, 1),
      selectedDateKey: null,
      mobileView: 'list',
      draftChecklist: [],
      agendas: {
        '2026-06-10': [
          { text: 'Confirm videos to be made for June', done: false },
          { text: 'Shortlist topics', done: true },
          { text: 'Lock timeline', done: false }
        ],
        '2026-06-15': [
          { text: 'Team sync', done: false },
          { text: 'Discuss blockers', done: false },
          { text: 'Prepare content outline', done: true }
        ],
        '2026-06-23': [
          { text: 'Review campaign ideas', done: false }
        ]
      }
    };

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatReadableDate(date) {
      return new Intl.DateTimeFormat('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).format(date);
    }

    function getMonthTitle(date) {
      return new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(date);
    }

    function getGridDates() {
      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const startOffset = firstDay.getDay();
      const gridStart = new Date(year, month, 1 - startOffset);
      return Array.from({ length: 35 }, (_, i) => {
        const date = new Date(gridStart);
        date.setDate(gridStart.getDate() + i);
        return date;
      });
    }

    function renderCalendar() {
      monthLabel.textContent = getMonthTitle(state.currentMonth);
      renderDesktopCalendar();
      renderMobileCalendar();
    }

    function renderDesktopCalendar() {
      const month = state.currentMonth.getMonth();
      calendarGrid.innerHTML = '';

      getGridDates().forEach((date) => {
        const dateKey = formatDateKey(date);
        const items = state.agendas[dateKey] || [];
        const isCurrentMonth = date.getMonth() === month;
        const isToday = dateKey === formatDateKey(today);
        const isSelected = state.selectedDateKey === dateKey;

        const button = document.createElement('button');
        button.type = 'button';
        button.className = `day-cell${isCurrentMonth ? '' : ' other-month'}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`;
        button.setAttribute('aria-label', `${formatReadableDate(date)}. ${items.length} agenda items.`);
        button.innerHTML = `
          <div class="date-row">
            <span class="date-badge">${date.getDate()}</span>
            <span class="agenda-count">${items.length ? `${items.length} item${items.length > 1 ? 's' : ''}` : ''}</span>
          </div>
          <div class="agenda-preview">
            ${items.length ? items.slice(0, 2).map(item => `<span class="agenda-chip">${item.done ? '☑' : '☐'} ${escapeHtml(item.text)}</span>`).join('') : '<span class="agenda-chip more">No agenda</span>'}
            ${items.length > 2 ? `<span class="agenda-chip more">+${items.length - 2} more</span>` : ''}
          </div>
        `;
        button.addEventListener('click', () => openDrawer(dateKey));
        calendarGrid.appendChild(button);
      });
    }

    function renderMobileCalendar() {
      const month = state.currentMonth.getMonth();
      mobileCalendarGrid.innerHTML = '';

      getGridDates().forEach((date) => {
        const dateKey = formatDateKey(date);
        const items = state.agendas[dateKey] || [];
        const isCurrentMonth = date.getMonth() === month;
        const isToday = dateKey === formatDateKey(today);
        const isSelected = state.selectedDateKey === dateKey;

        const card = document.createElement('button');
        card.type = 'button';
        card.className = `mobile-day-card${isCurrentMonth ? '' : ' other-month'}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`;
        card.setAttribute('aria-label', `${formatReadableDate(date)}. ${items.length} agenda items.`);

        const preview = state.mobileView === 'compact'
          ? `<div class="mobile-meta"><span class="mobile-weekday">${new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(date)}</span><span class="agenda-count">${items.length} item${items.length !== 1 ? 's' : ''}</span></div>`
          : `
            <div class="mobile-agenda-preview">
              ${items.length ? items.slice(0, 2).map(item => `<span class="mobile-agenda-chip">${item.done ? '☑' : '☐'} ${escapeHtml(item.text)}</span>`).join('') : '<span class="mobile-agenda-chip more">No agenda yet</span>'}
              ${items.length > 2 ? `<span class="mobile-agenda-chip more">+${items.length - 2} more</span>` : ''}
            </div>
          `;

        card.innerHTML = `
          <div class="mobile-date-row">
            <div style="display:flex; align-items:center; gap:0.75rem;">
              <span class="mobile-date-number">${date.getDate()}</span>
              <div>
                <div>${new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(date)}</div>
                <div class="mobile-weekday">${new Intl.DateTimeFormat('en-US', { month: 'long', day: 'numeric' }).format(date)}</div>
              </div>
            </div>
            <span class="agenda-count">${items.length} item${items.length !== 1 ? 's' : ''}</span>
          </div>
          ${preview}
        `;

        card.addEventListener('click', () => openDrawer(dateKey));
        mobileCalendarGrid.appendChild(card);
      });
    }

    function renderChecklistItems() {
      checklistItems.innerHTML = '';

      if (!state.draftChecklist.length) {
        checklistItems.innerHTML = '<div class="empty-state">No agenda items yet. Add one above.</div>';
        return;
      }

      state.draftChecklist.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = `checklist-item${item.done ? ' done' : ''}`;
        row.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''} aria-label="Mark agenda item" />
          <span>${escapeHtml(item.text)}</span>
          <button class="remove-check-btn" type="button" aria-label="Remove agenda item">✕</button>
        `;

        const checkbox = row.querySelector('input');
        const removeBtn = row.querySelector('button');

        checkbox.addEventListener('change', () => {
          state.draftChecklist[index].done = checkbox.checked;
          renderChecklistItems();
          renderAgendaList();
          renderCalendar();
        });

        removeBtn.addEventListener('click', () => {
          state.draftChecklist.splice(index, 1);
          renderChecklistItems();
          renderAgendaList();
        });

        checklistItems.appendChild(row);
      });
    }

    function renderAgendaList() {
      const items = state.draftChecklist;
      agendaList.innerHTML = '';

      if (!items.length) {
        agendaList.innerHTML = '<div class="empty-state">No agenda list for this day yet.</div>';
        clearDayAgendaBtn.disabled = true;
        clearDayAgendaBtn.style.opacity = '0.5';
        return;
      }

      clearDayAgendaBtn.disabled = false;
      clearDayAgendaBtn.style.opacity = '1';

      const summary = document.createElement('div');
      summary.className = 'day-summary';
      summary.innerHTML = `
        <strong>${items.length} item${items.length > 1 ? 's' : ''} planned</strong>
        <div class="mobile-agenda-preview">${items.map(item => `<span class="mobile-agenda-chip${item.done ? ' more' : ''}">${item.done ? '☑' : '☐'} ${escapeHtml(item.text)}</span>`).join('')}</div>
      `;
      agendaList.appendChild(summary);
    }

    function openDrawer(dateKey) {
      state.selectedDateKey = dateKey;
      const date = new Date(`${dateKey}T00:00:00`);
      drawerTitle.textContent = 'Daily Agenda';
      drawerDateText.textContent = formatReadableDate(date);
      state.draftChecklist = (state.agendas[dateKey] || []).map(item => ({ ...item }));
      renderChecklistItems();
      renderAgendaList();
      renderCalendar();
      agendaDrawer.classList.add('open');
      drawerBackdrop.classList.add('open');
      agendaDrawer.setAttribute('aria-hidden', 'false');
      checkItemInput.value = '';
    }

    function closeDrawer() {
      agendaDrawer.classList.remove('open');
      drawerBackdrop.classList.remove('open');
      agendaDrawer.setAttribute('aria-hidden', 'true');
    }

    function saveAgenda() {
      if (!state.selectedDateKey) return;
      if (state.draftChecklist.length) {
        state.agendas[state.selectedDateKey] = state.draftChecklist.map(item => ({ ...item }));
      } else {
        delete state.agendas[state.selectedDateKey];
      }
      renderCalendar();
      renderAgendaList();
    }

    function clearDayAgenda() {
      state.draftChecklist = [];
      renderChecklistItems();
      renderAgendaList();
    }

    function addChecklistItem() {
      const text = checkItemInput.value.trim();
      if (!text) {
        checkItemInput.focus();
        return;
      }
      state.draftChecklist.push({ text, done: false });
      checkItemInput.value = '';
      renderChecklistItems();
      renderAgendaList();
      checkItemInput.focus();
    }

    function escapeHtml(value) {
      return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
    }

    prevMonthBtn.addEventListener('click', () => {
      state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonthBtn.addEventListener('click', () => {
      state.currentMonth = new Date(state.currentMonth.getFullYear(), state.currentMonth.getMonth() + 1, 1);
      renderCalendar();
    });

    mobileSwitches.forEach((button) => {
      button.addEventListener('click', () => {
        state.mobileView = button.dataset.mobileView;
        mobileSwitches.forEach((item) => item.classList.toggle('active', item === button));
        renderMobileCalendar();
      });
    });

    addCheckItemBtn.addEventListener('click', addChecklistItem);
    checkItemInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        addChecklistItem();
      }
    });

    saveAgendaBtn.addEventListener('click', saveAgenda);
    clearDayAgendaBtn.addEventListener('click', clearDayAgenda);
    closeDrawerBtn.addEventListener('click', closeDrawer);
    drawerBackdrop.addEventListener('click', closeDrawer);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeDrawer();
    });

    let currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon();

    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      updateThemeIcon();
    });

    function updateThemeIcon() {
      themeToggle.innerHTML = currentTheme === 'dark' ? '<span aria-hidden="true">☀</span>' : '<span aria-hidden="true">☾</span>';
      themeToggle.setAttribute('aria-label', currentTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }

    renderChecklistItems();
    renderAgendaList();
    renderCalendar();
  </script>
</body>
</html>
